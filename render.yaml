services:
  # Serviço principal que roda Front e Back juntos
  - type: web
    name: contabilidade-erp
    runtime: python
    # O comando de build instala o Node, gera o dist do React e depois instala o Python
    buildCommand: rm -f .env && npm install && npm run build && pip install -r api/requirements.txt
    # O comando de start usa o Gunicorn rodando o arquivo wsgi.py criado
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contabilidade-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: NODE_VERSION
        value: 20.15.0
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: contabilidade-db
    databaseName: contabilidade
    user: contabilidade_user
    plan: free
